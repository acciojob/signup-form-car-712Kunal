<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="" method="post">
		<label for="name">Name</label>
		<input type="text" required id="name" placeholder="Name">

		<label for="email">Email</label>
		<input type="email" required id="email" placeholder="Email">

		<label for="gender">Gender</label>
		<input type="radio" required id="gender_m">Male
		<input type="radio" required id="gender_f">Female

		<select multiple id="cars">
			<option>Audi</option>
			<option>Ferarri</option>
			<option>Lamborgini</option>
		</select>

		<label for="age">Age</label>
		<input type="number" required id="age">

		<label for="dob">DOB</label>
		<input type="date" required id="dob">

		<label for="tel">Phone Number</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">

		<label for="password">Password</label>
		<input type="password" required id="password" placeholder="Password">

		
		<input type="checkbox" required id="tos">

		<button>Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
